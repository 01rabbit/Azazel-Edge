name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -U pip wheel setuptools
          pip install -r requirements/runtime.txt
          pip install pytest

      - name: Run tests
        run: |
          . .venv/bin/activate
          PYTHONPATH=. pytest -q

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Rust tests
        run: |
          cd rust/azazel-edge-core
          cargo test
