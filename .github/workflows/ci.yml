name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -U pip wheel setuptools
          pip install -r requirements/runtime.txt
          pip install pytest

      - name: Run tests
        run: |
          . .venv/bin/activate
          PYTHONPATH=. pytest -q

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Rust tests
        run: |
          cd rust/azazel-edge-core
          cargo test

  dependency-review:
    name: Dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  supply-chain-baseline:
    name: SBOM + dependency scan baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install supply-chain tools
        run: |
          python -m pip install -U pip
          pip install cyclonedx-bom pip-audit

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          cyclonedx-py requirements requirements/runtime.txt --output-file sbom-runtime.cdx.json

      - name: Run dependency vulnerability scan (baseline)
        continue-on-error: true
        run: |
          pip-audit -r requirements/runtime.txt -f json -o pip-audit-runtime.json

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-baseline
          path: |
            sbom-runtime.cdx.json
            pip-audit-runtime.json
