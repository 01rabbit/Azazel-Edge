id: rb.ops.epd.state.check
title: EPD State Check
domain: ops
audience: operator
risk: low
effect: read_only
requires_approval: false
args_schema:
  type: object
  properties: {}
  required: []
steps:
  - Compare the rendered EPD state with WebUI and TUI.
  - If mismatched, inspect epd refresh timer and runtime snapshot.
user_message_template: "EPDの最新描画状態を確認しています。"
command:
  exec: /bin/cat
  argv:
    - /run/azazel-edge/epd_last_render.json

