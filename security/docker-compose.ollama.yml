services:
  ollama:
    image: ollama/ollama:latest
    container_name: azazel-edge-ollama
    restart: unless-stopped
    cpus: 2.0
    mem_limit: 4g
    memswap_limit: 4g
    pids_limit: 512
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    ulimits:
      nofile: 1048576
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
