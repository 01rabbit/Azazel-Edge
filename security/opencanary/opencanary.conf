{
  "device.node_id": "azazel-edge-opencanary",
  "device.listen_addr": "127.0.0.1",
  "ip.ignorelist": [],
  "logtype.ignorelist": [],

  "http.enabled": true,
  "http.port": 18080,
  "http.banner": "Apache/2.2.22 (Ubuntu)",
  "http.skin": "nasLogin",
  "http.log_unimplemented_method_requests": false,
  "http.log_redirect_request": false,

  "ssh.enabled": true,
  "ssh.port": 12222,
  "ssh.version": "SSH-2.0-OpenSSH_5.1p1 Debian-4",

  "ftp.enabled": false,
  "https.enabled": false,
  "mysql.enabled": false,
  "redis.enabled": false,
  "rdp.enabled": false,
  "sip.enabled": false,
  "snmp.enabled": false,
  "ntp.enabled": false,
  "tftp.enabled": false,
  "telnet.enabled": false,
  "mssql.enabled": false,
  "vnc.enabled": false,
  "portscan.enabled": false,
  "llmnr.enabled": false,

  "logger": {
    "class": "PyLogger",
    "kwargs": {
      "formatters": {
        "plain": {
          "format": "%(message)s"
        }
      },
      "handlers": {
        "console": {
          "class": "logging.StreamHandler",
          "stream": "ext://sys.stdout"
        },
        "file": {
          "class": "logging.FileHandler",
          "filename": "/var/log/opencanary/opencanary.log"
        }
      }
    }
  }
}
