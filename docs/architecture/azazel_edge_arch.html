<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:13px}
/* HEADER */
.hd{padding:12px 18px 8px;border-bottom:1px solid #1e2535;flex-shrink:0}
.hd h1{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:3px}
.hd p{font-size:11px;color:#64748b;max-width:700px;line-height:1.5}
/* LEGEND */
.legend{display:flex;gap:14px;padding:7px 18px;border-bottom:1px solid #1e2535;flex-shrink:0;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* BODY */
.body{display:flex;flex:1;min-height:0}
/* DIAGRAM */
.diag-wrap{flex:1;overflow:auto;padding:14px 18px;min-width:0}
.diag{display:flex;gap:0;align-items:flex-start;position:relative;width:max-content}
/* COLUMN */
.col{display:flex;flex-direction:column;gap:7px;width:158px;flex-shrink:0}
.col-head{font-size:9px;color:#475569;letter-spacing:.12em;text-transform:uppercase;padding:0 2px 5px;border-bottom:1px solid #1e2535;margin-bottom:1px;white-space:nowrap}
/* NODE */
.node{border:1px solid #1e2535;border-radius:5px;padding:7px 9px;cursor:default;transition:border-color .12s,opacity .12s,box-shadow .12s;position:relative;background:#131720}
.node .n-dot{width:5px;height:5px;border-radius:50%;position:absolute;top:8px;right:8px}
.node .n-label{font-size:11.5px;font-weight:500;color:#e2e8f0;margin-bottom:1px;padding-right:10px}
.node .n-sub{font-size:10px;color:#475569;line-height:1.35}
.node.lit{border-color:var(--nc) !important;box-shadow:0 0 0 1px var(--nc),0 0 10px rgba(0,0,0,.4);background:#1a2030;z-index:1}
.node.dim{opacity:.2}
/* GAP between columns */
.col-gap{width:36px;flex-shrink:0}
/* SVG overlay */
.conn-svg{position:absolute;top:0;left:0;pointer-events:none}
/* RIGHT PANEL */
.panel{width:280px;flex-shrink:0;border-left:1px solid #1e2535;display:flex;flex-direction:column;overflow:hidden}
.p-flows{flex:1;overflow-y:auto;padding:10px 10px 6px}
.p-flows::-webkit-scrollbar{width:3px}
.p-flows::-webkit-scrollbar-thumb{background:#1e2535}
/* GROUP */
.grp-head{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.12em;padding:10px 4px 5px;border-bottom:1px solid #1e2535;margin-bottom:4px}
.grp-head:first-child{padding-top:2px}
/* FLOW BUTTON */
.fb{width:100%;text-align:left;padding:7px 9px;border-radius:4px;background:transparent;border:1px solid transparent;color:#94a3b8;cursor:pointer;margin-bottom:3px;transition:all .1s;display:block}
.fb:hover{background:#161d28;border-color:#1e2535;color:#e2e8f0}
.fb.active{background:#1a2333;border-color:#2d4068;color:#f1f5f9}
.fb .ft{font-size:11.5px;font-weight:500;display:block;margin-bottom:1px}
.fb .fd{font-size:10px;color:#475569;line-height:1.4;display:block}
.fb.active .fd{color:#64748b}
/* CLEAR */
.clear-btn{width:calc(100% - 20px);margin:6px 10px;text-align:center;padding:5px;font-size:10px;color:#475569;background:transparent;border:1px solid #1e2535;border-radius:4px;cursor:pointer;display:block}
.clear-btn:hover{color:#94a3b8;border-color:#334155}
/* STEPS PANEL */
.p-steps{border-top:1px solid #1e2535;flex-shrink:0;overflow-y:auto;max-height:38vh;padding:10px}
.p-steps::-webkit-scrollbar{width:3px}
.p-steps::-webkit-scrollbar-thumb{background:#1e2535}
.steps-head{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.step{display:flex;gap:8px;margin-bottom:9px}
.step-n{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#1e293b;color:#64748b;border:1px solid #2d3f55}
.step-b .sf{font-size:11px;font-weight:500;color:#e2e8f0}
.step-b .sl{font-size:10px;color:#64748b;margin-top:1px}
.no-sel{font-size:11px;color:#475569;text-align:center;padding:16px 0}
</style>

let active=null;let svgEl=null;

document.getElementById('ttl').textContent=D.title;
document.getElementById('sub').textContent=D.subtitle;
const leg=document.getElementById('leg');
D.legend.forEach(l=>{const d=document.createElement('div');d.className='leg-item';d.innerHTML=`<div class="leg-dot" style="background:${l.color}"></div>${l.label}`;leg.appendChild(d);});

// Build node lookup
const nodeById={};D.nodes.forEach(n=>nodeById[n.id]=n);

// Build columns
const colOrder=D.columns.map(c=>c.id);
const colMap={};D.columns.forEach(c=>colMap[c.id]=c);
const byCol={};colOrder.forEach(c=>byCol[c]=[]);
D.nodes.forEach(n=>{if(byCol[n.col])byCol[n.col].push(n);});
Object.values(byCol).forEach(a=>a.sort((a,b)=>a.row-b.row));

const diag=document.getElementById('diag');
const nels={};

colOrder.forEach((cid,ci)=>{
  if(ci>0){const g=document.createElement('div');g.className='col-gap';g.id='gap-'+cid;diag.appendChild(g);}
  const col=document.createElement('div');col.className='col';col.id='col-'+cid;
  const h=document.createElement('div');h.className='col-head';h.textContent=colMap[cid].label;col.appendChild(h);
  byCol[cid].forEach(n=>{
    const el=document.createElement('div');el.className='node';el.id='nd-'+n.id;
    el.style.setProperty('--nc',n.color);
    el.innerHTML=`<div class="n-dot" style="background:${n.color}"></div><div class="n-label">${n.label}</div><div class="n-sub">${n.sub}</div>`;
    col.appendChild(el);nels[n.id]=el;
  });
  diag.appendChild(col);
});

// Build flow panel with groups
const pf=document.getElementById('pf');
// Collect all flows with group tag
const allFlows=[];
D.flow_groups.forEach(g=>{
  const gh=document.createElement('div');gh.className='grp-head';gh.textContent=g.group+' ('+g.flows.length+')';pf.appendChild(gh);
  g.flows.forEach(f=>{
    allFlows.push(f);
    const btn=document.createElement('button');btn.className='fb';btn.id='fb-'+f.id;
    btn.innerHTML=`<span class="ft">${f.title}</span><span class="fd">${f.desc}</span>`;
    btn.onclick=()=>pick(f.id);
    pf.appendChild(btn);
  });
});

document.getElementById('clr').onclick=()=>clear();

function pick(id){
  active=id;
  const f=allFlows.find(x=>x.id===id);
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  document.getElementById('fb-'+id)?.classList.add('active');
  Object.keys(nels).forEach(nid=>{
    nels[nid].classList.remove('lit','dim');
    nels[nid].classList.add(f.nodes.includes(nid)?'lit':'dim');
  });
  renderSteps(f);
  drawArrows(f);
}

function clear(){
  active=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  Object.values(nels).forEach(el=>el.classList.remove('lit','dim'));
  document.getElementById('sl').innerHTML='<div class="no-sel">Select a flow →</div>';
  if(svgEl){svgEl.remove();svgEl=null;}
}

function renderSteps(f){
  const sl=document.getElementById('sl');sl.innerHTML='';
  f.steps.forEach((s,i)=>{
    const fn=nodeById[s.from],tn=nodeById[s.to];
    const d=document.createElement('div');d.className='step';
    d.innerHTML=`<div class="step-n">${i+1}</div><div class="step-b">
      <div class="sf"><span style="color:${fn?.color||'#94a3b8'}">${fn?.label||s.from}</span><span style="color:#334155"> → </span><span style="color:${tn?.color||'#94a3b8'}">${tn?.label||s.to}</span></div>
      <div class="sl">${s.label}</div></div>`;
    sl.appendChild(d);
  });
}

function drawArrows(f){
  if(svgEl){svgEl.remove();svgEl=null;}
  if(!f)return;
  const dw=document.getElementById('diag-wrap')||diag.parentElement;
  const dr=diag.getBoundingClientRect();
  const sw=diag.scrollWidth,sh=diag.scrollHeight;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','conn-svg');
  svg.style.cssText=`position:absolute;top:0;left:0;width:${sw}px;height:${sh}px;pointer-events:none`;
  svg.setAttribute('viewBox',`0 0 ${sw} ${sh}`);
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  ['grn','org'].forEach((id,i)=>{
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id','arr-'+id);m.setAttribute('markerWidth','7');m.setAttribute('markerHeight','7');
    m.setAttribute('refX','6');m.setAttribute('refY','3');m.setAttribute('orient','auto');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','0 0,7 3,0 6');p.setAttribute('fill',i===0?'#4ade80':'#f97316');
    m.appendChild(p);defs.appendChild(m);
  });
  svg.appendChild(defs);

  const diagRect=diag.getBoundingClientRect();
  const dsx=diag.parentElement.scrollLeft,dsy=diag.parentElement.scrollTop;

  f.steps.forEach(s=>{
    const fe=nels[s.from],te=nels[s.to];if(!fe||!te)return;
    const fr=fe.getBoundingClientRect(),tr=te.getBoundingClientRect();
    const fx=fr.right-diagRect.left+dsx-2;
    const fy=(fr.top+fr.bottom)/2-diagRect.top+dsy;
    const tx=tr.left-diagRect.left+dsx+2;
    const ty=(tr.top+tr.bottom)/2-diagRect.top+dsy;
    const sameCol=fr.left===tr.left;
    const fromNode=nodeById[s.from];
    const color=fromNode?.color||'#4ade80';
    const markId=color==='#f97316'?'arr-org':'arr-grn';

    let d;
    if(sameCol){
      // same column: route around
      const mx=Math.max(fx+40,tx+40);
      d=`M${fx},${fy} C${mx},${fy} ${mx},${ty} ${tx},${ty}`;
    } else {
      const cx1=fx+(tx-fx)*.45,cx2=tx-(tx-fx)*.45;
      d=`M${fx},${fy} C${cx1},${fy} ${cx2},${ty} ${tx},${ty}`;
    }
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('stroke',color);
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-opacity','0.75');
    path.setAttribute('marker-end','url(#'+markId+')');
    svg.appendChild(path);
  });
  diag.style.position='relative';
  diag.insertBefore(svg,diag.firstChild);
  svgEl=svg;
}

window.addEventListener('resize',()=>{if(active)pick(active);});
</script>
